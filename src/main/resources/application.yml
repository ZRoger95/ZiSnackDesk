spring:
  application:
    name: BOSYON-ZiSnackDesk
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PWD}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          max-wait: 1000ms
          min-idle: 0
        shutdown-timeout: 100ms
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PWD}
#    type: com.alibaba.druid.pool.DruidDataSource
#    hikari:
#      pool-name: DatebookHikariCP
#      minimum-idle: 20
#      maximum-pool-size: 50
#      auto-commit: true
#      idle-timeout: 20000
#      max-lifetime: 30000
#      connection-timeout: 120000


logging:
  structured:
    format:
      # console: ecs # 控制台输出 ECS 格式
      file: logstash # 文件输出 Logstash 格式
  logback:
    rollingpolicy:
      max-file-size: 10MB      # 单个日志文件最大 10MB[reference:8]
      max-history: 30          # 保留 30 个归档文件[reference:9]
      total-size-cap: 2GB      # 归档日志总大小上限为 2GB[reference:10]
      clean-history-on-start: true # 启动时清理历史归档[reference:11]

server:
  port: 8085
